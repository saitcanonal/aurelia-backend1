<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURELİA — Randevu Paneli</title>
<style>
  :root{ --ink:#0F0F0F; --panel:#1A1A1A; --gold:#D4AF37; --gold-light:#E9CE7A; --stone:#8F8A80; --line:rgba(212,175,55,0.18); }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--ink); color:#fff; font-family:'Segoe UI',Arial,sans-serif; padding:24px; }
  h1{ font-weight:500; letter-spacing:.02em; margin-bottom:4px; }
  .sub{ color:var(--stone); font-size:.9rem; margin-bottom:24px; }
  .bar{ display:flex; gap:12px; flex-wrap:wrap; align-items:end; margin-bottom:24px; }
  label{ display:block; font-size:.75rem; color:var(--stone); margin-bottom:6px; letter-spacing:.05em; text-transform:uppercase; }
  input{ background:var(--panel); border:1px solid var(--line); color:#fff; padding:10px 12px; border-radius:4px; font-size:.95rem; }
  button{ background:var(--gold); color:var(--ink); border:none; padding:11px 20px; border-radius:4px; font-weight:600; cursor:pointer; }
  button:hover{ background:var(--gold-light); }
  button.ghost{ background:transparent; border:1px solid var(--line); color:#fff; }
  table{ width:100%; border-collapse:collapse; }
  th,td{ text-align:left; padding:12px 14px; border-bottom:1px solid var(--line); font-size:.92rem; }
  th{ color:var(--gold); font-weight:500; font-size:.78rem; letter-spacing:.06em; text-transform:uppercase; }
  tr.empty td{ color:var(--stone); }
  .badge{ display:inline-block; padding:3px 10px; border-radius:20px; font-size:.72rem; letter-spacing:.03em; }
  .badge.pending{ background:rgba(212,175,55,0.18); color:var(--gold-light); }
  .badge.confirmed{ background:rgba(80,200,120,0.18); color:#7be29a; }
  .badge.cancelled{ background:rgba(220,80,80,0.18); color:#e58a8a; text-decoration:line-through; }
  .actions button{ padding:5px 10px; font-size:.75rem; margin-right:6px; }
  #loginBox{ max-width:360px; margin:80px auto; background:var(--panel); padding:30px; border-radius:8px; border:1px solid var(--line); }
  #loginBox h2{ margin-bottom:16px; font-weight:500; }
  #msg{ margin-top:14px; font-size:.85rem; color:#e58a8a; }
  #panel{ display:none; }
</style>
</head>
<body>

<div id="loginBox">
  <h2>AURELİA — Yönetici Girişi</h2>
  <label for="adminKey">Admin Anahtarı</label>
  <input id="adminKey" type="password" placeholder="aurelia-99" style="width:100%;">
  <div style="margin-top:6px; font-size:.78rem; color:var(--stone);">Ayrıca backend adresini de girin:</div>
  <label for="apiBase" style="margin-top:10px;">Backend Adresi</label>
  <input id="apiBase" type="text" placeholder="https://aurelia-backend1.onrender.com" style="width:100%;">
  <button style="margin-top:16px; width:100%;" onclick="login()">Giriş Yap</button>
  <div id="msg"></div>
</div>

<div id="panel">
  <h1>Randevu Paneli</h1>
  <div class="sub">Seçilen güne ait tüm saatler; boş, bekleyen ve onaylanan randevular tek bakışta.</div>

  <div class="bar">
    <div>
      <label for="dateInput">Tarih</label>
      <input id="dateInput" type="date">
    </div>
    <button onclick="loadSchedule()">Getir</button>
    <button class="ghost" onclick="logout()">Çıkış</button>
  </div>

  <table>
    <thead>
      <tr><th style="width:90px;">Saat</th><th>Müşteri</th><th>Telefon</th><th>Hizmet / Sebep</th><th>Durum</th><th>İşlem</th></tr>
    </thead>
    <tbody id="scheduleBody"></tbody>
  </table>
</div>

<script>
  let ADMIN_KEY = '';
  let API_BASE = '';

  function todayISO(){
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function login(){
    ADMIN_KEY = document.getElementById('adminKey').value.trim();
    API_BASE = document.getElementById('apiBase').value.trim().replace(/\/$/, '');
    if(!ADMIN_KEY || !API_BASE){
      document.getElementById('msg').textContent = 'Lütfen anahtar ve backend adresini giriniz.';
      return;
    }
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    document.getElementById('dateInput').value = todayISO();
    loadSchedule();
  }

  function logout(){
    ADMIN_KEY = ''; API_BASE = 'https://aurelia-backend1.onrender.com';
    document.getElementById('panel').style.display = 'none';
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('msg').textContent = '';
  }

  async function loadSchedule(){
    const date = document.getElementById('dateInput').value;
    if(!date) return;
    const body = document.getElementById('scheduleBody');
    body.innerHTML = '<tr class="empty"><td colspan="6">Yükleniyor...</td></tr>';

    try{
      const res = await fetch(`${API_BASE}/api/admin/bookings?date=${date}`, {
        headers: { 'x-admin-key': ADMIN_KEY }
      });
      if(res.status === 401){
        logout();
        document.getElementById('msg').textContent = 'Anahtar hatalı, tekrar giriş yapın.';
        return;
      }
      const data = await res.json();
      if(!res.ok){
        body.innerHTML = `<tr class="empty"><td colspan="6">${data.error || 'Bir hata oluştu.'}</td></tr>`;
        return;
      }
      renderSchedule(data.schedule || []);
    }catch(err){
      body.innerHTML = '<tr class="empty"><td colspan="6">Sunucuya bağlanılamadı.</td></tr>';
    }
  }

  function renderSchedule(schedule){
    const body = document.getElementById('scheduleBody');
    if(!schedule.length){
      body.innerHTML = '<tr class="empty"><td colspan="6">Bu gün mağaza kapalı.</td></tr>';
      return;
    }
    body.innerHTML = schedule.map(s => {
      if(!s.booked){
        return `<tr class="empty"><td>${s.time}</td><td colspan="4">— Boş —</td><td></td></tr>`;
      }
      return `<tr>
        <td>${s.time}</td>
        <td>${escapeHtml(s.name)}</td>
        <td>${escapeHtml(s.phone)}</td>
        <td>${escapeHtml(s.service)}</td>
        <td><span class="badge ${s.status}">${statusLabel(s.status)}</span></td>
        <td class="actions">
          ${s.status !== 'confirmed' ? `<button onclick="setStatus(${s.id},'confirmed')">Onayla</button>` : ''}
          ${s.status !== 'cancelled' ? `<button class="ghost" onclick="setStatus(${s.id},'cancelled')">İptal</button>` : ''}
        </td>
      </tr>`;
    }).join('');
  }

  function statusLabel(status){
    return { pending:'Bekliyor', confirmed:'Onaylandı', cancelled:'İptal' }[status] || status;
  }

  async function setStatus(id, status){
    await fetch(`${API_BASE}/api/admin/bookings/${id}`, {
      method:'PATCH',
      headers:{ 'Content-Type':'application/json', 'x-admin-key': ADMIN_KEY },
      body: JSON.stringify({ status })
    });
    loadSchedule();
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str == null ? '' : str;
    return div.innerHTML;
  }
</script>
</body>
</html>
